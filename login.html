<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Sabor da Esquina</title>
  <meta name="description" content="Faça login ou cadastre-se no Sabor da Esquina para fazer pedidos online." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />

  <script type="module" src="/src/login.ts"></script>
</head>
<body>
  <div class="auth">
    <!-- ═══ Lado esquerdo: Hero animado ═══ -->
    <div class="auth__hero">
      <img
        class="auth__hero-bg"
        src="https://images.unsplash.com/photo-1466978913421-dad2ebd01d17?w=1920&q=80"
        alt=""
        aria-hidden="true"
        loading="eager"
      />
      <div class="auth__hero-overlay"></div>

      <!-- Ícones flutuantes -->
      <span class="auth__float auth__float--1" aria-hidden="true">🍔</span>
      <span class="auth__float auth__float--2" aria-hidden="true">🍟</span>
      <span class="auth__float auth__float--3" aria-hidden="true">🥤</span>
      <span class="auth__float auth__float--4" aria-hidden="true">🌭</span>
      <span class="auth__float auth__float--5" aria-hidden="true">🍕</span>
      <span class="auth__float auth__float--6" aria-hidden="true">🧀</span>
      <span class="auth__float auth__float--7" aria-hidden="true">🥓</span>
      <span class="auth__float auth__float--8" aria-hidden="true">🍗</span>

      <!-- Conteúdo central -->
      <div class="auth__hero-content">
        <a href="index.html" class="auth__logo" aria-label="Voltar para página inicial">
          <div class="auth__logo-icon">S</div>
          <span class="auth__logo-text">Sabor <i>da Esquina</i></span>
        </a>
        <h1 class="auth__hero-title" id="auth-hero-title">Bem-vindo de volta!</h1>
        <p class="auth__hero-subtitle">O melhor lanche da cidade te espera.</p>
      </div>
    </div>

    <!-- ═══ Lado direito: Formulários ═══ -->
    <div class="auth__panel">
      <div class="auth__card">
        <!-- Tabs Login / Cadastro -->
        <div class="auth__tabs">
          <button class="auth__tab auth__tab--active" data-tab="login" type="button">Entrar</button>
          <button class="auth__tab" data-tab="register" type="button">Cadastrar</button>
          <div class="auth__tab-indicator"></div>
        </div>

        <!-- ── Formulário LOGIN ── -->
        <form class="auth__form" id="login-form" novalidate>
          <div class="form__group">
            <input type="email" id="login-email" name="email" class="form__input" placeholder=" " required autocomplete="email" />
            <label for="login-email" class="form__label">E-mail</label>
            <span class="form__feedback"></span>
          </div>

          <div class="form__group">
            <input type="password" id="login-password" name="password" class="form__input" placeholder=" " required minlength="6" autocomplete="current-password" />
            <label for="login-password" class="form__label">Senha</label>
            <button type="button" class="form__toggle-pw" aria-label="Mostrar senha" data-target="login-password">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <span class="form__feedback"></span>
          </div>

          <div class="auth__options">
            <label class="auth__checkbox">
              <input type="checkbox" name="remember" />
              <span class="auth__checkbox-mark"></span>
              Lembrar de mim
            </label>
            <a href="#" class="auth__link">Esqueceu a senha?</a>
          </div>

          <button type="submit" class="btn btn--primary btn--lg auth__submit">
            <span class="auth__submit-text">Entrar</span>
            <span class="auth__submit-loading" aria-hidden="true"></span>
          </button>

          <div class="auth__divider">
            <span>ou</span>
          </div>

          <button type="button" class="auth__social-btn">
            <svg viewBox="0 0 24 24" width="20" height="20">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continuar com Google
          </button>

          <p class="auth__switch">
            Não tem conta? <button type="button" class="auth__switch-btn" data-tab="register">Cadastre-se</button>
          </p>
        </form>

        <!-- ── Formulário CADASTRO ── -->
        <form class="auth__form auth__form--hidden" id="register-form" novalidate>
          <div class="form__group">
            <input type="text" id="reg-name" name="name" class="form__input" placeholder=" " required minlength="2" autocomplete="name" />
            <label for="reg-name" class="form__label">Nome completo</label>
            <span class="form__feedback"></span>
          </div>

          <div class="form__group">
            <input type="email" id="reg-email" name="email" class="form__input" placeholder=" " required autocomplete="email" />
            <label for="reg-email" class="form__label">E-mail</label>
            <span class="form__feedback"></span>
          </div>

          <div class="form__group">
            <input type="tel" id="reg-phone" name="phone" class="form__input" placeholder=" " required autocomplete="tel" />
            <label for="reg-phone" class="form__label">Telefone / WhatsApp</label>
            <span class="form__feedback"></span>
          </div>

          <div class="form__group">
            <input type="password" id="reg-password" name="password" class="form__input" placeholder=" " required minlength="6" autocomplete="new-password" />
            <label for="reg-password" class="form__label">Senha</label>
            <button type="button" class="form__toggle-pw" aria-label="Mostrar senha" data-target="reg-password">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <span class="form__feedback"></span>
            <div class="auth__pw-strength" id="pw-strength">
              <div class="auth__pw-bar"><span></span><span></span><span></span><span></span></div>
              <span class="auth__pw-text"></span>
            </div>
          </div>

          <div class="form__group">
            <input type="password" id="reg-confirm" name="confirm" class="form__input" placeholder=" " required minlength="6" autocomplete="new-password" />
            <label for="reg-confirm" class="form__label">Confirmar senha</label>
            <span class="form__feedback"></span>
          </div>

          <label class="auth__checkbox auth__checkbox--terms">
            <input type="checkbox" name="terms" required />
            <span class="auth__checkbox-mark"></span>
            Aceito os <a href="#" class="auth__link">termos de uso</a> e <a href="#" class="auth__link">política de privacidade</a>
          </label>

          <button type="submit" class="btn btn--primary btn--lg auth__submit">
            <span class="auth__submit-text">Criar Conta</span>
            <span class="auth__submit-loading" aria-hidden="true"></span>
          </button>

          <p class="auth__switch">
            Já tem conta? <button type="button" class="auth__switch-btn" data-tab="login">Faça login</button>
          </p>
        </form>

        <!-- Toast -->
        <div class="auth__toast" id="auth-toast" role="status" aria-live="polite">
          <span class="auth__toast-icon">✓</span>
          <span class="auth__toast-text" id="auth-toast-text"></span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
